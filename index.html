<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventário de Imóveis — Regional RJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:    #1a4a6b;
      --verde-lt: #1a3a52;
      --areia:    #0d1f2d;
      --texto:    #e8f0f7;
      --muted:    #7a9bb5;
      --borda:    #1e3a50;
      --branco:   #112233;
      --tag-bg:   #1a3a52;
      --tag-tx:   #7ec8e3;
      --accent:   #e8a020;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--areia);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: #1a4a6b;
      color: #ffffff;
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
    }
    header h1 {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    header p {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      opacity: 0.82;
    }
    .header-btns {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-cadastrar {
      background: var(--accent);
      color: var(--verde);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.55rem 1.25rem;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-cadastrar:hover { opacity: 0.88; }

    /* ── FILTROS ── */
    .filtros-wrap {
      background: var(--branco);
      border-bottom: 1px solid var(--borda);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .filtros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.65rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .filtros-grid select,
    .filtros-grid input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--borda);
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: 'Nunito', sans-serif;
      background: var(--areia);
      color: var(--texto);
      appearance: none;
    }
    .date-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .date-wrap label {
      font-size: 0.72rem;
      color: var(--muted);
      padding-left: 0.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .filtros-grid input[type="date"] {
      color-scheme: dark;
    }
    .filtros-grid select:focus,
    .filtros-grid input:focus {
      outline: 2px solid var(--verde);
      outline-offset: 1px;
    }
    .btn-limpar {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--borda);
      border-radius: 8px;
      font-size: 0.85rem;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s;
    }
    .btn-limpar:hover { background: var(--verde-lt); color: var(--texto); }

    /* ── CONTAGEM ── */
    .contagem {
      max-width: 900px;
      margin: 1.25rem auto 0.5rem;
      padding: 0 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── LISTA ── */
    .lista {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--branco);
      border: 1px solid var(--borda);
      border-radius: 14px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.08); }

    .card-regiao {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--tag-tx);
      background: var(--tag-bg);
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      width: fit-content;
    }
    .card-titulo {
      font-family: 'Raleway', sans-serif;
      font-size: 1.15rem;
      line-height: 1.3;
      color: var(--texto);
    }
    .card-local {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .card-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.15rem;
    }
    .meta-pill {
      font-size: 0.78rem;
      background: var(--areia);
      border: 1px solid var(--borda);
      border-radius: 999px;
      padding: 0.18rem 0.6rem;
      color: var(--texto);
    }
    .card-diferenciais {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      border-top: 1px solid var(--borda);
      padding-top: 0.6rem;
      margin-top: 0.15rem;
    }
    .card-footer {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 0.6rem;
      border-top: 1px solid var(--borda);
    }
    .card-footer a {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--verde);
      text-decoration: none;
      border: 1px solid var(--verde);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      transition: background 0.15s;
    }
    .card-footer a:hover { background: var(--verde-lt); }

    /* ── COMODIDADES ── */
    .card-comodidades {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.15rem;
    }
    .comod-pill {
      font-size: 0.75rem;
      background: var(--verde-lt);
      border: 1px solid var(--borda);
      border-radius: 999px;
      padding: 0.18rem 0.6rem;
      color: var(--tag-tx);
    }

    /* ── ESTADOS ── */
    .estado {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .estado strong { display: block; font-size: 1.1rem; color: var(--texto); margin-bottom: 0.4rem; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--borda);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATS ── */
    .stats-wrap {
      background: #1a4a6b;
      padding: 1rem 1.5rem;
      overflow-x: auto;
    }
    .stats-inner {
      display: flex;
      gap: 0.75rem;
      max-width: 900px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      font-size: 0.78rem;
      color: #e8f0f7;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s;
    }
    .stat-pill:hover { background: rgba(255,255,255,0.2); }
    .stat-pill span { color: var(--accent); font-weight: 600; margin-left: 0.3rem; }

    /* ── RESPONSIVO ── */
    @media (max-width: 480px) {
      .lista { grid-template-columns: 1fr; }
      .filtros-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Inventário de Imóveis<br>Regional RJ</h1>
  <p>Consulte os imóveis cadastrados pelos membros da Regional-RJ da Comunidade MiCasaSuCasa</p>
  <div class="header-btns">
    <a class="btn-cadastrar" href="https://forms.gle/49zSCytTS2CbHfcV8" target="_blank">
      + Cadastrar meu imóvel
    </a>
  </div>
</header>

<div class="stats-wrap" id="stats-wrap" style="display:none">
  <div class="stats-inner" id="stats-inner"></div>
</div>

<div class="filtros-wrap">
  <div class="filtros-grid">
    <select id="f-estado">
      <option value="">Todos os estados</option>
      <option>RJ</option>
    </select>
    <select id="f-regiao">
      <option value="">Todas as regiões</option>
      <option>Capital — Zona Sul</option>
      <option>Capital — Zona Norte</option>
      <option>Capital — Centro</option>
      <option>Capital — Zona Oeste</option>
      <option>Grande Niterói</option>
      <option>Região dos Lagos</option>
      <option>Costa Verde</option>
      <option>Região Serrana</option>
      <option>Região Norte Fluminense</option>
      <option>Região Noroeste Fluminense</option>
      <option>Região Centro-Sul Fluminense</option>
      <option>Baixada Fluminense</option>
      <option>Médio Paraíba</option>
      <option>Outro</option>
    </select>
    <select id="f-tipo">
      <option value="">Todos os tipos</option>
      <option>Studio</option>
      <option>Apartamento</option>
      <option>Casa</option>
      <option>Chácara</option>
      <option>Sítio</option>
      <option>Chalé</option>
      <option>Outro</option>
    </select>
    <select id="f-quartos">
      <option value="">Quartos (qualquer)</option>
      <option value="0">0 (Studio)</option>
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
    </select>
    <input id="f-hospedes" type="number" placeholder="Mín. hóspedes" min="1"/>
    <input id="f-busca" type="text" placeholder="Buscar cidade ou bairro"/>
    <div class="date-wrap">
      <label for="f-checkin">Check-in</label>
      <input id="f-checkin" type="date"/>
    </div>
    <div class="date-wrap">
      <label for="f-checkout">Check-out</label>
      <input id="f-checkout" type="date"/>
    </div>
    <button class="btn-limpar" onclick="limparFiltros()">Limpar filtros</button>
  </div>
</div>

<div class="contagem" id="contagem"></div>

<div class="lista" id="lista">
  <div class="estado">
    <div class="spinner"></div>
    Carregando imóveis...
  </div>
</div>

<script>
  // ── CONFIGURAÇÃO ──────────────────────────────────────────
  const SHEET_ID = '11-kg-dct22HqFk8KUn2cWQI4OIxRe5n5bk_-hQcQjPk';
  const SHEET_NAME = 'Respostas ao formulário 1';
  // Colunas (índice 0 = coluna A):
  // 0: Carimbo | 1: Nome | 2: Região | 3: Cidade | 4: Bairro
  // 5: Tipo    | 6: Quartos | 7: Hóspedes | 8: Diferenciais
  // 9: Link    | 10: Contato
  const COL = { TS:0, NOME:1, REGIAO:2, CIDADE:3, BAIRRO:4,
                TIPO:5, QUARTOS:6, HOSPEDES:7, DIFER:8,
                ESTADO:11, COMODIDADES:12, LINK:13, CONTATO:14, ICAL:15 };
  // ─────────────────────────────────────────────────────────

  let dados = [];
  let bloqueios = {}; // { linkAnuncio: [{inicio, fim}, ...] }

  async function carregarBloqueios() {
    const SHEET_BLOQUEIOS = 'Bloqueios';
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_BLOQUEIOS)}`;
    try {
      const res = await fetch(url);
      const txt = await res.text();
      const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows || [];
      bloqueios = {};
      rows.forEach(r => {
        const cols = r.c.map(c => c ? (c.f || c.v || '') : '');
        const link = cols[0]; const ini = cols[1]; const fim = cols[2];
        if (!link || !ini || !fim) return;
        if (!bloqueios[link]) bloqueios[link] = [];
        bloqueios[link].push({ inicio: ini, fim: fim });
      });
    } catch(e) { bloqueios = {}; }
  }

  function parseData(s) {
    if (!s) return null;
    if (s.includes('-')) {
      const [a,m,d] = s.split('-');
      return new Date(Number(a), Number(m)-1, Number(d));
    }
    if (s.includes('/')) {
      const [d,m,a] = s.split('/');
      return new Date(Number(a), Number(m)-1, Number(d));
    }
    return null;
  }

  function estaDisponivel(linkAnuncio, checkIn, checkOut) {
    if (!checkIn || !checkOut) return true;
    const entrada = parseData(checkIn);
    const saida   = parseData(checkOut);
    if (!entrada || !saida || entrada >= saida) return true;
    const lista = bloqueios[linkAnuncio] || [];
    for (const b of lista) {
      const ini = parseData(b.inicio);
      const fim = parseData(b.fim);
      if (!ini || !fim) continue;
      if (ini < saida && fim > entrada) return false;
    }
    return true;
  }

  async function carregar() {
    await carregarBloqueios();
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    try {
      const res = await fetch(url);
      const txt = await res.text();
      const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows;
      // Ignora primeira linha se for cabeçalho
      const primeiraLinha = rows[0] ? rows[0].c.map(c => c ? (c.f || c.v || '') : '') : [];
      const ehCabecalho = primeiraLinha[0] && primeiraLinha[0].toLowerCase().includes('carimbo');
      const dadosBrutos = ehCabecalho ? rows.slice(1) : rows;
      dados = dadosBrutos.map(r => r.c.map(c => c ? (c.f || c.v || '') : ''));
      renderizarStats();
      renderizar();
    } catch(e) {
      document.getElementById('lista').innerHTML =
        `<div class="estado"><strong>Não foi possível carregar os dados</strong>Verifique se a planilha está pública para visualização.</div>`;
    }
  }

  function renderizar() {
    const estado   = document.getElementById('f-estado').value.trim();
    const regiao   = document.getElementById('f-regiao').value.trim();
    const tipo     = document.getElementById('f-tipo').value.trim();
    const quartos  = document.getElementById('f-quartos').value;
    const hospedes = parseInt(document.getElementById('f-hospedes').value) || 0;
    const busca    = document.getElementById('f-busca').value.toLowerCase().trim();

    const filtrados = dados.filter(r => {
      if (estado   && r[COL.ESTADO] !== estado)  return false;
      if (regiao   && r[COL.REGIAO] !== regiao) return false;
      if (tipo     && r[COL.TIPO]   !== tipo)   return false;
      if (quartos !== '') {
        const q = parseInt(r[COL.QUARTOS]) || 0;
        if (q < parseInt(quartos)) return false;
      }
      if (hospedes) {
        const h = parseInt(r[COL.HOSPEDES]) || 0;
        if (h < hospedes) return false;
      }
      if (busca) {
        const haystack = `${r[COL.CIDADE]} ${r[COL.BAIRRO]}`.toLowerCase();
        if (!haystack.includes(busca)) return false;
      }
      const checkIn  = document.getElementById('f-checkin').value;
      const checkOut = document.getElementById('f-checkout').value;
      if (checkIn && checkOut) {
        const linkRef = r[COL.LINK] ? r[COL.LINK].trim() : '';
        // Sem iCal cadastrado: oculta quando ambas as datas estão preenchidas
        if (!linkRef || bloqueios[linkRef] === undefined) return false;
        if (!estaDisponivel(linkRef, checkIn, checkOut)) return false;
      }
      return true;
    });

    const cont = document.getElementById('contagem');
    cont.textContent = filtrados.length === 0
      ? ''
      : `${filtrados.length} imóvel${filtrados.length > 1 ? 'is' : ''} encontrado${filtrados.length > 1 ? 's' : ''}`;

    const lista = document.getElementById('lista');
    if (filtrados.length === 0) {
      lista.innerHTML = `<div class="estado"><strong>Nenhum imóvel encontrado</strong>Tente ajustar os filtros.</div>`;
      return;
    }

    lista.innerHTML = filtrados.map(r => {
      const estado = r[COL.ESTADO] ? ` · ${r[COL.ESTADO]}` : '';
      const bairro = r[COL.BAIRRO] ? `, ${r[COL.BAIRRO]}` : '';
      const local  = `${r[COL.CIDADE]}${bairro}${estado}`;
      const q      = r[COL.QUARTOS] ? `${r[COL.QUARTOS]} quarto${r[COL.QUARTOS]==='1'?'':'s'}` : '';
      const h      = r[COL.HOSPEDES] ? `até ${r[COL.HOSPEDES]} hóspedes` : '';
      const difer  = r[COL.DIFER] ? `<div class="card-diferenciais">${escHtml(r[COL.DIFER])}</div>` : '';
      const comodRaw = r[COL.COMODIDADES] || '';
      const comodList = comodRaw.split(',').map(s => s.trim()).filter(Boolean);
      const comodIcons = {
        'Ar-condicionado': '❄️',
        'Cozinha equipada': '🍳',
        'Máquina de lavar': '🫧',
        'Piscina': '🏊',
        'Estacionamento': '🚗',
        'Aceita pets': '🐾',
        'Churrasqueira': '🔥',
        'Vista para o mar': '🌊',
      };
      const comodHTML = comodList.length
        ? `<div class="card-comodidades">${comodList.map(c => `<span class="comod-pill">${comodIcons[c] || '✓'} ${escHtml(c)}</span>`).join('')}</div>`
        : '';

      const links = [];
      if (r[COL.LINK]) {
        let href = r[COL.LINK].trim();
        if (!/^https?:\/\//i.test(href)) href = 'https://' + href;
        links.push(`<a href="${href}" target="_blank" rel="noopener">Ver anúncio</a>`);
      }
      if (r[COL.CONTATO]) {
        // Números chegam como decimal da API (ex: 5521997980648.0), converter para string limpa
        const cOriginal = String(r[COL.CONTATO]).replace(/\.0$/, '').trim();
        const isEmail = cOriginal.includes('@');
        if (isEmail) {
          links.push(`<a href="mailto:${cOriginal}">E-mail</a>`);
        } else {
          const soDigitos = cOriginal.replace(/[^0-9]/g,'');
          const isWA = soDigitos.length >= 10 && soDigitos.length <= 20;
          if (isWA) {
            let num = soDigitos;
            if (num.length <= 11) num = '55' + num;
            links.push(`<a href="https://wa.me/${num}" target="_blank" rel="noopener">WhatsApp</a>`);
          }
        }
      }
      const footer = links.length ? `<div class="card-footer">${links.join('')}</div>` : '';

      return `
        <div class="card">
          <span class="card-regiao">${escHtml(r[COL.REGIAO])}</span>
          <div class="card-titulo">${escHtml(r[COL.TIPO])} — ${escHtml(r[COL.NOME])}</div>
          <div class="card-local">📍 ${escHtml(local)}</div>
          <div class="card-meta">
            ${q ? `<span class="meta-pill">🛏 ${escHtml(q)}</span>` : ''}
            ${h ? `<span class="meta-pill">👥 ${escHtml(h)}</span>` : ''}
          </div>
          ${comodHTML}
          ${difer}
          ${footer}
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function renderizarStats() {
    const contagem = {};
    dados.forEach(r => {
      const reg = r[COL.REGIAO] || 'Sem região';
      contagem[reg] = (contagem[reg] || 0) + 1;
    });
    const wrap = document.getElementById('stats-wrap');
    const inner = document.getElementById('stats-inner');
    if (dados.length === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    const total = dados.length;
    inner.innerHTML =
      `<div class="stat-pill" onclick="limparFiltros()">Total<span>${total}</span></div>` +
      Object.entries(contagem)
        .sort((a,b) => b[1]-a[1])
        .map(([reg, n]) =>
          `<div class="stat-pill" onclick="filtrarPorRegiao('${reg}')">${reg}<span>${n}</span></div>`
        ).join('');
  }

  function filtrarPorRegiao(regiao) {
    document.getElementById('f-regiao').value = regiao;
    renderizar();
    document.getElementById('stats-wrap').scrollIntoView({behavior:'smooth'});
  }

  function limparFiltros() {
    ['f-estado','f-regiao','f-tipo','f-quartos'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-checkin').value = '';
    document.getElementById('f-checkout').value = '';
    document.getElementById('f-hospedes').value = '';
    document.getElementById('f-busca').value = '';
    renderizar();
  }

  ['f-estado','f-regiao','f-tipo','f-quartos','f-hospedes','f-busca','f-checkin','f-checkout'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderizar);
  });

  carregar();
</script>
</body>
</html>
